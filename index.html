<script>

let audioContext;
let analyser;
let dataArray;
let stream;
let running=false;

let lastBeat=0;
let intervals=[];

async function startListening(){

if(running) return;

stream = await navigator.mediaDevices.getUserMedia({audio:true});

audioContext = new (window.AudioContext || window.webkitAudioContext)();

const source = audioContext.createMediaStreamSource(stream);

analyser = audioContext.createAnalyser();
analyser.fftSize = 1024;

source.connect(analyser);

dataArray = new Uint8Array(analyser.fftSize);

running=true;

detectBeat();

}

function stopListening(){

running=false;

if(stream){
stream.getTracks().forEach(t=>t.stop());
}

if(audioContext){
audioContext.close();
}

document.getElementById("bpm").innerText="--";
document.getElementById("rpm").innerText="--";

intervals=[];
lastBeat=0;

}

function detectBeat(){

if(!running) return;

analyser.getByteTimeDomainData(dataArray);

let max=0;

for(let i=0;i<dataArray.length;i++){

let v=Math.abs(dataArray[i]-128);

if(v>max) max=v;

}

if(max>60){

let now=performance.now();

if(now-lastBeat>250){

if(lastBeat!==0){

let interval=now-lastBeat;

intervals.push(interval);

if(intervals.length>10) intervals.shift();

let avg=intervals.reduce((a,b)=>a+b)/intervals.length;

let bpm=Math.round(60000/avg);

updateDisplay(bpm);

}

lastBeat=now;

}

}

requestAnimationFrame(detectBeat);

}

function updateDisplay(bpm){

document.getElementById("bpm").innerText=bpm;

let rpm;

if(bpm<=110){
rpm=bpm;
}else{
rpm=Math.round(bpm/2);
}

document.getElementById("rpm").innerText=rpm;

}

</script>
