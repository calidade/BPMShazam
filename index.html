<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM → RPM con Realtime BPM Analyzer</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:white;text-align:center;padding:30px;}
#bpm,#rpm{font-size:60px;margin:20px;}
button{font-size:24px;padding:15px 30px;margin:10px;}
</style>
</head>
<body>

<h1>BPM → RPM Indoor</h1>
<div>BPM: <span id="bpm">--</span></div>
<div>RPM: <span id="rpm">--</span></div>

<button onclick="start()">ACTIVAR MICRÓFONO</button>
<button onclick="stop()">DESACTIVAR</button>

<script src="https://unpkg.com/realtime-bpm-analyzer/dist/realtime-bpm-analyzer.min.js"></script>

<script>
let audioCtx, source, analyzer;
let running = false;

async function start(){
  if(running) return;
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  audioCtx = new AudioContext();
  source = audioCtx.createMediaStreamSource(stream);
  analyzer = await createRealtimeBpmAnalyzer(audioCtx);

  source.connect(analyzer.node);

  analyzer.on('bpm', data => {
    const bpm = Math.round(data.bpm[0].tempo);
    document.getElementById('bpm').innerText = bpm;
    document.getElementById('rpm').innerText = bpm <= 110 ? bpm : Math.round(bpm/2);
  });

  running = true;
}

function stop(){
  if(!running) return;
  source.disconnect();
  analyzer.node.disconnect();
  audioCtx.close();
  document.getElementById('bpm').innerText = '--';
  document.getElementById('rpm').innerText = '--';
  running = false;
}
</script>

</body>
</html>
