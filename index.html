<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM → RPM</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
}

.container{
width:95%;
max-width:500px;
}

.display{
background:#1b1b1b;
border-radius:12px;
padding:25px;
margin-bottom:25px;
}

.value{
font-size:18vw;
font-weight:bold;
}

.label{
opacity:.7;
}

button{
width:100%;
padding:25px;
margin-top:15px;
font-size:6vw;
border:none;
border-radius:12px;
}

.start{background:#00c853;color:white;}
.stop{background:#d50000;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="display">
<div class="label">BPM</div>
<div id="bpm" class="value">--</div>
</div>

<div class="display">
<div class="label">RPM</div>
<div id="rpm" class="value">--</div>
</div>

<button class="start" onclick="start()">ACTIVAR MICRÓFONO</button>
<button class="stop" onclick="stop()">DESACTIVAR</button>

</div>

<script>

let ctx;
let analyser;
let data;
let stream;
let running=false;

let lastBeat=0;
let intervals=[];

async function start(){

if(running) return;

stream=await navigator.mediaDevices.getUserMedia({audio:true});

ctx=new (window.AudioContext||window.webkitAudioContext)();

let source=ctx.createMediaStreamSource(stream);

analyser=ctx.createAnalyser();
analyser.fftSize=2048;

source.connect(analyser);

data=new Uint8Array(analyser.frequencyBinCount);

running=true;

loop();

}

function stop(){

running=false;

if(stream){
stream.getTracks().forEach(t=>t.stop());
}

if(ctx){
ctx.close();
}

document.getElementById("bpm").innerText="--";
document.getElementById("rpm").innerText="--";

intervals=[];
lastBeat=0;

}

function loop(){

if(!running) return;

analyser.getByteFrequencyData(data);

let energy=0;

for(let i=2;i<30;i++){
energy+=data[i];
}

energy/=28;

if(energy>140){

let now=performance.now();

if(now-lastBeat>300){

if(lastBeat!==0){

let interval=now-lastBeat;

intervals.push(interval);

if(intervals.length>8) intervals.shift();

let avg=intervals.reduce((a,b)=>a+b)/intervals.length;

let bpm=Math.round(60000/avg);

update(bpm);

}

lastBeat=now;

}

}

requestAnimationFrame(loop);

}

function update(bpm){

document.getElementById("bpm").innerText=bpm;

let rpm;

if(bpm<=110) rpm=bpm;
else rpm=Math.round(bpm/2);

document.getElementById("rpm").innerText=rpm;

}

</script>

</body>
</html>
